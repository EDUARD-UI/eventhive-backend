# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# SUPABASE STORAGE
supabase.url=https://jcigroanxweuzbkmqbib.supabase.co
supabase.key=${SUPABASE_SECRET_KEY}

# BUCKETS
supabase.bucket.verificaciones=verificacion-docs
supabase.bucket.eventos=eventos-images
supabase.bucket.categorias=categorias-images

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20