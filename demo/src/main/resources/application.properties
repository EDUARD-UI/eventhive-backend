spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${PORT:8080}

# Proxy/Forwarding para Render (crítico)
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Configuración de sesión y cookies
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie

# configuración de codificación
server.tomcat.uri-encoding=UTF-8
# spring.web.encoding.charset=UTF-8
# spring.web.encoding.force=true

# cargas de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# rutas de subida de archivos
# upload.path=uploads/categorias
# upload.path.eventos=uploads/eventos
# upload.path.verificacion=uploads/verificacion

# Servir archivos estáticos desde uploads
spring.web.resources.static-locations=classpath:/static/,file:./uploads/